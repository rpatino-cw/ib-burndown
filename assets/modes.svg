<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .m { opacity: 0; }
    .m1 { animation: fi 0.6s ease 0.3s forwards; }
    .m2 { animation: fi 0.6s ease 1.0s forwards; }
    .m3 { animation: fi 0.6s ease 1.7s forwards; }
    .shared { opacity: 0; animation: fi 0.6s ease 2.4s forwards; }
    @keyframes fi { to { opacity: 1; } }
  </style>

  <!-- Title -->
  <text x="20" y="28" fill="#e0e0e0" font-size="15" font-weight="700" class="m m1">One tool. Two modes. Every switch.</text>

  <!-- IB Mode -->
  <g class="m m2">
    <rect x="20" y="45" width="320" height="110" rx="12" fill="#1a1a2e" stroke="#4a9ec4" stroke-width="2"/>
    <text x="40" y="72" fill="#4a9ec4" font-size="14" font-weight="700">ib-lookup</text>
    <text x="145" y="72" fill="#555" font-size="11">default mode</text>
    <text x="40" y="95" fill="#aaa" font-size="11">InfiniBand fabric connections</text>
    <text x="40" y="112" fill="#888" font-size="10">Spine, Core, Leaf, Node switches</text>
    <text x="40" y="127" fill="#888" font-size="10">QM9700 port diagrams, IB ports</text>
    <text x="40" y="142" fill="#555" font-size="10">Source: IB Sketch .xlsx</text>
  </g>

  <!-- Trad Mode -->
  <g class="m m3">
    <rect x="360" y="45" width="320" height="110" rx="12" fill="#1a1a2e" stroke="#c4955a" stroke-width="2"/>
    <text x="380" y="72" fill="#c4955a" font-size="14" font-weight="700">ib-lookup --trad</text>
    <text x="380" y="95" fill="#aaa" font-size="11">Traditional networking connections</text>
    <text x="380" y="112" fill="#888" font-size="10">TOR, infra, frontend, edge, grid, pod</text>
    <text x="380" y="127" fill="#888" font-size="10">swp/eth ports, full rack inventory</text>
    <text x="380" y="142" fill="#555" font-size="10">Source: MASTER cutsheet .xlsx</text>
  </g>

  <!-- Shared features -->
  <g class="shared">
    <rect x="120" y="170" width="460" height="40" rx="8" fill="#111122" stroke="#81c784" stroke-width="1.5"/>
    <text x="155" y="195" fill="#81c784" font-size="12" font-weight="600">Shared:</text>
    <text x="215" y="195" fill="#aaa" font-size="11">Floor maps</text>
    <text x="305" y="195" fill="#555" font-size="11">|</text>
    <text x="320" y="195" fill="#aaa" font-size="11">Rack elevations</text>
    <text x="435" y="195" fill="#555" font-size="11">|</text>
    <text x="450" y="195" fill="#aaa" font-size="11">DCT tips</text>
    <text x="520" y="195" fill="#555" font-size="11">|</text>
    <text x="535" y="195" fill="#aaa" font-size="11">layouts.json</text>
  </g>
</svg>
