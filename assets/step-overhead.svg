<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .s { opacity: 0; }
    .s1 { animation: fi 0.6s ease 0.3s forwards; }
    .s2 { animation: fi 0.6s ease 1.2s forwards; }
    .s3 { animation: fi 0.6s ease 2.1s forwards; }
    .s4 { animation: fi 0.6s ease 3.0s forwards; }
    .a1 { opacity: 0; animation: fi 0.4s ease 0.9s forwards; }
    .a2 { opacity: 0; animation: fi 0.4s ease 1.8s forwards; }
    .a3 { opacity: 0; animation: fi 0.4s ease 2.7s forwards; }
    @keyframes fi { to { opacity: 1; } }
  </style>

  <!-- CSV file -->
  <g class="s s1">
    <rect x="10" y="30" width="140" height="70" rx="10" fill="#1a1a2e" stroke="#c4955a" stroke-width="2"/>
    <text x="30" y="55" fill="#c4955a" font-size="12" font-weight="600">overhead.csv</text>
    <text x="30" y="72" fill="#888" font-size="10">Physical rack layout</text>
  </g>

  <!-- Arrow -->
  <g class="a1">
    <line x1="160" y1="65" x2="190" y2="65" stroke="#c4955a" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="190,60 205,65 190,70" fill="#c4955a"/>
  </g>

  <!-- Parser -->
  <g class="s s2">
    <rect x="210" y="20" width="170" height="90" rx="10" fill="#1a1a2e" stroke="#4ac49a" stroke-width="2"/>
    <text x="230" y="48" fill="#4ac49a" font-size="12" font-weight="600">--import-overhead</text>
    <text x="230" y="68" fill="#888" font-size="10">Auto-detects:</text>
    <text x="230" y="82" fill="#aaa" font-size="9">columns, serpentine, DHs</text>
    <text x="230" y="96" fill="#aaa" font-size="9">rack ranges, row counts</text>
  </g>

  <!-- Arrow -->
  <g class="a2">
    <line x1="390" y1="65" x2="420" y2="65" stroke="#4ac49a" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="420,60 435,65 420,70" fill="#4ac49a"/>
  </g>

  <!-- layouts.json -->
  <g class="s s3">
    <rect x="440" y="30" width="120" height="70" rx="10" fill="#1a1a2e" stroke="#81c784" stroke-width="2"/>
    <text x="455" y="55" fill="#81c784" font-size="12" font-weight="600">layouts.json</text>
    <text x="455" y="72" fill="#888" font-size="10">~/.datahall/</text>
  </g>

  <!-- Arrow -->
  <g class="a3">
    <line x1="570" y1="65" x2="600" y2="65" stroke="#81c784" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="600,60 615,65 600,70" fill="#81c784"/>
  </g>

  <!-- Floor maps -->
  <g class="s s4">
    <rect x="620" y="25" width="70" height="80" rx="10" fill="#1a1a2e" stroke="#4a9ec4" stroke-width="2"/>
    <text x="632" y="50" fill="#4a9ec4" font-size="11" font-weight="600">Floor</text>
    <text x="632" y="65" fill="#4a9ec4" font-size="11" font-weight="600">Maps</text>
    <text x="638" y="82" fill="#888" font-size="20">m</text>
  </g>

  <!-- Bottom label -->
  <g class="s s1">
    <text x="10" y="140" fill="#555" font-size="11">One command. No questions. Fully automatic.</text>
    <rect x="10" y="150" width="680" height="35" rx="6" fill="#111122" stroke="#333" stroke-width="1"/>
    <text x="25" y="173" fill="#81c784" font-size="13" font-family="monospace">$ ib-lookup --import-overhead your-site-overhead.csv</text>
  </g>
</svg>
