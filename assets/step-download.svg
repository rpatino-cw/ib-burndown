<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .step { opacity: 0; }
    .step1 { animation: fadeIn 0.6s ease 0.3s forwards; }
    .step2 { animation: fadeIn 0.6s ease 1.5s forwards; }
    .step3 { animation: fadeIn 0.6s ease 2.7s forwards; }
    .arrow { opacity: 0; }
    .arrow1 { animation: fadeIn 0.4s ease 1.1s forwards; }
    .arrow2 { animation: fadeIn 0.4s ease 2.3s forwards; }
    .check { opacity: 0; animation: pop 0.4s ease 3.5s forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes pop { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
  </style>

  <!-- Step 1: Google Sheets -->
  <g class="step step1">
    <rect x="20" y="30" width="200" height="90" rx="12" fill="#1a1a2e" stroke="#4a9ec4" stroke-width="2"/>
    <text x="40" y="58" fill="#4a9ec4" font-size="11" font-weight="bold">1</text>
    <text x="55" y="58" fill="#e0e0e0" font-size="13" font-weight="600">Open in Google Sheets</text>
    <text x="40" y="80" fill="#888" font-size="11">Your site's spreadsheet</text>
    <rect x="40" y="92" width="160" height="18" rx="4" fill="#0d47a1" opacity="0.3"/>
    <text x="50" y="105" fill="#64b5f6" font-size="10">docs.google.com/spreadsheets/...</text>
  </g>

  <!-- Arrow 1 -->
  <g class="arrow arrow1">
    <line x1="230" y1="75" x2="260" y2="75" stroke="#4a9ec4" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="260,70 275,75 260,80" fill="#4a9ec4"/>
  </g>

  <!-- Step 2: Download -->
  <g class="step step2">
    <rect x="280" y="30" width="200" height="90" rx="12" fill="#1a1a2e" stroke="#c4955a" stroke-width="2"/>
    <text x="300" y="58" fill="#c4955a" font-size="11" font-weight="bold">2</text>
    <text x="315" y="58" fill="#e0e0e0" font-size="13" font-weight="600">File > Download</text>
    <text x="300" y="80" fill="#888" font-size="11">Microsoft Excel (.xlsx)</text>
    <g transform="translate(300, 88)">
      <rect width="120" height="20" rx="4" fill="#2e7d32" opacity="0.3"/>
      <text x="10" y="14" fill="#81c784" font-size="10" font-weight="500">Download .xlsx</text>
      <text x="100" y="14" fill="#81c784" font-size="10">↓</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <g class="arrow arrow2">
    <line x1="490" y1="75" x2="520" y2="75" stroke="#c4955a" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="520,70 535,75 520,80" fill="#c4955a"/>
  </g>

  <!-- Step 3: Drop in folder -->
  <g class="step step3">
    <rect x="540" y="30" width="140" height="90" rx="12" fill="#1a1a2e" stroke="#81c784" stroke-width="2"/>
    <text x="560" y="58" fill="#81c784" font-size="11" font-weight="bold">3</text>
    <text x="575" y="58" fill="#e0e0e0" font-size="13" font-weight="600">Drop in folder</text>
    <text x="560" y="80" fill="#888" font-size="10">ib-burndown/</text>
    <text x="570" y="96" fill="#aaa" font-size="10">  Site - IB Sketch.xlsx</text>
  </g>

  <!-- Final check -->
  <g class="check" transform="translate(590, 5)">
    <circle cx="12" cy="12" r="12" fill="#2e7d32"/>
    <polyline points="6,12 10,16 18,8" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom: what the file contains -->
  <g class="step step3">
    <rect x="20" y="150" width="660" height="150" rx="12" fill="#111122" stroke="#333" stroke-width="1"/>
    <text x="40" y="178" fill="#e0e0e0" font-size="13" font-weight="600">What's inside the IB Sketch:</text>

    <g transform="translate(40, 195)">
      <rect width="290" height="85" rx="8" fill="#1a2233" stroke="#4a9ec4" stroke-width="1" opacity="0.8"/>
      <text x="15" y="22" fill="#4a9ec4" font-size="12" font-weight="600">Pull Schedule tabs</text>
      <text x="15" y="40" fill="#888" font-size="10">Source → Destination connections</text>
      <text x="15" y="55" fill="#888" font-size="10">Ports, cable type, optic, fabric ID</text>
      <text x="15" y="70" fill="#555" font-size="10">Core Group 1 Pull Schedule, DH2 Pull Schedule...</text>
    </g>

    <g transform="translate(350, 195)">
      <rect width="290" height="85" rx="8" fill="#1a2233" stroke="#c4955a" stroke-width="1" opacity="0.8"/>
      <text x="15" y="22" fill="#c4955a" font-size="12" font-weight="600">ELEV tabs</text>
      <text x="15" y="40" fill="#888" font-size="10">Rack + RU positions per switch</text>
      <text x="15" y="55" fill="#888" font-size="10">SKU, data hall, row assignments</text>
      <text x="15" y="70" fill="#555" font-size="10">DH1 ELEV, DH2 ELEV, DH3 ELEV...</text>
    </g>
  </g>
</svg>
